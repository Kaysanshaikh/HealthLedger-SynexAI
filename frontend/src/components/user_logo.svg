<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="user-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="user-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Orbit Ring (matches chatbot) -->
  <circle cx="50" cy="50" r="48" stroke="url(#user-grad)" stroke-width="1" stroke-dasharray="8 4" opacity="0.3" />

  <!-- Body / Shoulders -->
  <path d="M25 80C25 68 35 60 50 60C65 60 75 68 75 80V85H25V80Z" fill="url(#user-grad)" opacity="0.15" />
  <path d="M25 80C25 68 35 60 50 60C65 60 75 68 75 80" stroke="url(#user-grad)" stroke-width="2" stroke-linecap="round" />

  <!-- Face / Head -->
  <circle cx="50" cy="40" r="18" fill="white" stroke="url(#user-grad)" stroke-width="2" />
  
  <!-- Hair / Cap (Tech-style) -->
  <path d="M32 40C32 30 40 22 50 22C60 22 68 30 68 40" fill="url(#user-grad)" opacity="0.8" />

  <!-- Eyes with Blinking Animation -->
  <g id="eyes">
    <circle cx="43" cy="42" r="2.5" fill="#1E293B">
      <animate attributeName="ry" values="2.5;0.2;2.5" dur="4s" repeatCount="indefinite" begin="0.5s" />
    </circle>
    <circle cx="57" cy="42" r="2.5" fill="#1E293B">
      <animate attributeName="ry" values="2.5;0.2;2.5" dur="4s" repeatCount="indefinite" begin="0.5s" />
    </circle>
  </g>

  <!-- Friendly Smile -->
  <path d="M44 50C44 50 47 53 50 53C53 53 56 50 56 50" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round" />

  <!-- Health Tech Accessory (Earpiece/Sensor) -->
  <rect x="66" y="42" width="4" height="6" rx="2" fill="url(#user-grad)" filter="url(#user-glow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Subtle Breathing Pulse for the whole character -->
  <animateTransform 
    attributeName="transform" 
    type="translate" 
    values="0 0; 0 -1; 0 0" 
    dur="3s" 
    repeatCount="indefinite" 
  />
</svg>
