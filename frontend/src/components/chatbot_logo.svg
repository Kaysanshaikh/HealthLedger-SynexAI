<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bot-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="bot-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring / Orbit -->
  <circle cx="50" cy="50" r="48" stroke="url(#bot-grad)" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.4" />
  
  <!-- Robot Head Base -->
  <rect x="22" y="32" width="56" height="46" rx="14" fill="white" />
  <rect x="22" y="32" width="56" height="46" rx="14" fill="url(#bot-grad)" fill-opacity="0.1" stroke="url(#bot-grad)" stroke-width="2" />
  
  <!-- Eyes / Display Screen -->
  <rect x="30" y="42" width="40" height="18" rx="6" fill="#1E293B" />
  
  <!-- Friendly Glowing Eyes -->
  <circle cx="42" cy="51" r="3" fill="#38BDF8" filter="url(#bot-glow)">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="58" cy="51" r="3" fill="#38BDF8" filter="url(#bot-glow)">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Health ECG Line / Mouth -->
  <path d="M40 70H45L47 65L50 75L53 68L55 70H60" stroke="url(#bot-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Antennas with Signal -->
  <line x1="35" y1="32" x2="30" y2="22" stroke="url(#bot-grad)" stroke-width="3" stroke-linecap="round" />
  <line x1="65" y1="32" x2="70" y2="22" stroke="url(#bot-grad)" stroke-width="3" stroke-linecap="round" />
  <circle cx="30" cy="22" r="4" fill="#3B82F6" />
  <circle cx="70" cy="22" r="4" fill="#3B82F6" />
  
  <!-- Small Pulse Dot on Signal -->
  <circle cx="30" cy="22" r="6" stroke="#3B82F6" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="4;10" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0" dur="1.5s" repeatCount="indefinite" />
  </circle>
</svg>
